<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geri Dönüşleriniz | Çiçi Kitap</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="cat-bg" id="cat-bg"></div>

    <nav>
        <a href="../index.html" class="logo">
            <img src="https://img.icons8.com/ios-filled/50/ffffff/cat.png" alt="Çiçi Kitap Logo">
            Çiçi Kitap
        </a>
        <ul class="nav-links" id="nav-links">
            <li><a href="../index.html">Ana Sayfa</a></li>
            <li><a href="about.html">Hakkımızda</a></li>
            <li><a href="gallery.html">Kitaplarımız</a></li>
            <li><a href="contact.html">Geri Dönüşleriniz</a></li>
        </ul>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <main class="container">
        <h1 class="section-title">Geri Dönüşleriniz</h1>
        <div style="max-width: 600px; margin: 0 auto; background: var(--secondary-color); padding: 30px; border-radius: 10px; border: 1px solid var(--accent-color);">
            <form id="contact-form" onsubmit="event.preventDefault(); document.getElementById('contact-form').style.display = 'none'; document.getElementById('feedback-msg').style.display = 'block';">
                <div style="margin-bottom: 15px;">
                    <label>Adınız:</label><br>
                    <input type="text" style="width: 100%; padding: 10px; border-radius: 5px; border: none; margin-top: 5px;" required>
                </div>
                <div style="margin-bottom: 15px;">
                    <label>E-posta:</label><br>
                    <input type="email" style="width: 100%; padding: 10px; border-radius: 5px; border: none; margin-top: 5px;" required>
                </div>
                <div style="margin-bottom: 15px;">
                    <label>Mesajınız:</label><br>
                    <textarea rows="5" style="width: 100%; padding: 10px; border-radius: 5px; border: none; margin-top: 5px;" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Gönder 🐾</button>
            </form>
            <div id="feedback-msg" style="margin-top: 20px; text-align: center; color: var(--accent-color); display: none;">
                Mesajınız Çiçi'ye ulaştı! Teşekkür ederiz.
            </div>
        </div>
    </main>

    <footer style="text-align: center; padding: 2rem; background: #000; margin-top: 50px;">
        <p>&copy; 2026 Çiçi Kitap 🐾</p>
    </footer>

    <script src="../assets/js/app.js"></script>
</body>
</html>
