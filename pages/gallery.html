<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitaplarımız | Çiçi Kitap</title>

    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<div class="mama-banner">
    <p>🐾 Her kitap siparişinin %25'i sokak dostlarına mama olarak bağışlanır 🐾</p>
</div>

<!-- NAV -->
<nav>
    <a href="../index.html" class="logo">
        <img src="../assets/logo-3d.png" alt="logo">
        Çiçi Kitap
    </a>

    <ul class="nav-links" id="nav-links">
        <li><a href="../index.html">Ana Sayfa</a></li>
        <li><a href="about.html">Hakkımızda</a></li>
        <li><a href="gallery.html" class="active">Kitaplarımız</a></li>
        <li><a href="contact.html">Geri Dönüşleriniz</a></li>
        <li><a href="compare.html">Fiyat Karşılaştır</a></li>
    </ul>

    <div class="auth-buttons">
        <button class="btn btn-secondary" onclick="toggleModal('cart-modal')">
            🛒 <span id="cart-count">0</span>
        </button>
        <button class="btn btn-primary" onclick="toggleModal('login-modal')">Giriş</button>
    </div>

    <div class="hamburger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>
</nav>

<!-- BAŞLIK -->
<main class="container">
    <h1 class="section-title">Kitap Koleksiyonumuz</h1>

    <!-- 🔍 ARAMA + FİLTRE -->
    <div class="filter-area">

        <input type="text" id="searchInput" placeholder="Kitap veya yazar ara...">

        <select id="categorySelect">
            <option>Hepsi</option>
            <option>Türk Klasikleri</option>
            <option>Dünya Klasikleri</option>
            <option>Roman</option>
            <option>Şiir</option>
        </select>

    </div>

    <!-- 📚 KİTAPLAR -->
    <div class="book-grid" id="book-list">
        <!-- JS dolduracak -->
    </div>
</main>

<!-- 🛒 SEPET -->
<div id="cart-modal" class="modal">
    <div class="modal-header">
        <h3>Sepetim 🐾</h3>
        <span class="modal-close" onclick="toggleModal('cart-modal')">&times;</span>
    </div>

    <div id="cart-items-list"></div>

    <div style="margin-top:20px; font-weight:bold;">
        Toplam: <span id="cart-total">0 TL</span>
    </div>
</div>

<!-- 🔐 LOGIN -->
<div id="login-modal" class="modal">
    <div class="modal-header">
        <h3>Giriş Yap</h3>
        <span class="modal-close" onclick="toggleModal('login-modal')">&times;</span>
    </div>

    <form onsubmit="event.preventDefault(); loginDemo();">
        <input type="email" id="login-email" placeholder="E-posta" required>
        <input type="password" placeholder="Şifre" required>
        <button class="btn btn-primary">Giriş Yap</button>
    </form>
</div>

<!-- FOOTER -->
<footer style="text-align:center; padding:2rem; background:#000; margin-top:50px;">
    <p>&copy; 2026 Çiçi Kitap 🐾</p>
</footer>

<!-- ⚠️ ÖNEMLİ -->
<script src="../assets/js/app.js"></script>

</body>
</html>
